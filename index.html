<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechStore Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
<h2>TechStore Pro</h2>
<div>
<input id="search" placeholder="Search products...">
<button id="themeBtn">🌙</button>
<span>Cart: <span id="cartCount">0</span></span>
</div>
</nav>

<header class="hero">
<h1>Premium Tech Products</h1>
<p>Modern E‑Commerce Website using HTML, CSS & JavaScript</p>
</header>

<div class="filters">
<button onclick="filterProducts('All')">All</button>
<button onclick="filterProducts('Laptop')">Laptops</button>
<button onclick="filterProducts('Phone')">Phones</button>
<button onclick="filterProducts('Accessory')">Accessories</button>
</div>

<section id="products" class="products"></section>

<script src="script.js"></script>
</body>
</html>
